name: CI

on:
  push:
    branches: ['main']
  pull_request:
    branches: ['main']

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - name: Install pnpm
        run: npm install -g pnpm
      - name: Install dependencies
        run: pnpm install
      - name: Type check
        run: npx tsc --noEmit
      - name: Test
        run: pnpm test
      - name: Build
        run: pnpm build
        env:
          VITE_MAPTILER_KEY: dummy
